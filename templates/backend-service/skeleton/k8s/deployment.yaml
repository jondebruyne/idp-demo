apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}
  labels:
    app: ${{ values.name }}
    # FinOps: cost allocation tags, stamped automatically by the golden path
    team: ${{ values.owner }}
    cost-center: "${{ values.costCenter }}"
spec:
  replicas: 2
  selector:
    matchLabels: { app: ${{ values.name }} }
  template:
    metadata:
      labels:
        app: ${{ values.name }}
        team: ${{ values.owner }}
        cost-center: "${{ values.costCenter }}"
    spec:
      securityContext:
        runAsNonRoot: true          # satisfies the Kyverno policy by default
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/myorg/${{ values.name }}:latest
          ports: [{ containerPort: 8080 }]
          # resource requests/limits: right-sized defaults (scheduling + cost)
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
