apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: backend-service
  title: New Backend Service
  description: |
    Production-ready Node.js service on the paved road. Comes with CI/CD,
    a hardened Dockerfile, k8s manifests (probes + limits), OpenTelemetry,
    cost tags and TechDocs — all wired up and auto-registered in the catalog.
  tags: [recommended, node, golden-path]
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service details
      required: [name, owner, description]
      properties:
        name:
          title: Name
          type: string
          description: Unique, lowercase, dashes only
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string
          description: Team that will own this service
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        costCenter:
          title: Cost center
          type: string
          description: For FinOps allocation (stamped on every resource)
          default: "0000"

    - title: Repository
      required: [repoUrl]
      properties:
        repoUrl:
          title: Repository location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts: [github.com]

  steps:
    - id: fetch
      name: Render the skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          costCenter: ${{ parameters.costCenter }}

    - id: publish
      name: Create the repository
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: private

    - id: register
      name: Register in the catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Open the repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: View in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
